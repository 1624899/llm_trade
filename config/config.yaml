# 系统配置文件

# 系统配置
system:
  test_mode: false  # 测试模式，跳过LLM交互


# LLM模型配置 - 所有模型都使用OpenAI兼容格式
llm_models:
  deepseek:
    api_key: "sk-b62bc08f8fe6475b871c60bc22e979d1"
    base_url: "https://api.deepseek.com/v1"
    model: "deepseek-chat"
    max_tokens: 8192
    temperature: 0.7
  
# 心流开放平台配置
  xinliu:
    api_key: "sk-1492d65ea5891343559983c82cc4d18e"  # 填入您的OpenAI API密钥
    base_url: "https://apis.iflow.cn/v1"
    model: "qwen3-max"
    max_tokens: 8192
    temperature: 0.7
  
  qwen:
    api_key: ""  # 填入您的通义千问API密钥
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-turbo"
    max_tokens: 8000
    temperature: 0.7
  
  ollama:
    api_key: "ollama"  # Ollama通常不需要真实密钥
    base_url: "http://localhost:11434/v1"
    model: "llama2"
    max_tokens: 8000
    temperature: 0.7

# 当前激活的LLM模型
active_llm: "xinliu"




# 数据获取配置
data:
  update_interval: 180  # 数据更新间隔（秒）
  cache_duration: 3600  # 缓存持续时间（秒）
  realtime_cache_duration: 60  # 实时数据缓存持续时间（秒）
  retry_times: 3        # 重试次数
  timeout: 30           # 请求超时时间（秒）
  max_workers: 5        # 并发线程数
  price_change_limit: 0.2  # 价格变动限制（20%）
  volume_change_limit: 10.0  # 成交量变动限制（10倍）

# 技术指标参数
indicators:
  ema:
    short: 12
    long: 20
  macd:
    fast: 12
    slow: 26
    signal: 9
  rsi:
    period_7: 7
    period_14: 14
  kdj:
    period: 9
    k_period: 3
    d_period: 3
  boll:
    period: 20
    std_dev: 2
  wr:
    period: 14

# 日志配置
logging:
  level: "INFO"
  file: "logs/etf_trading.log"
  max_size: "10MB"
  backup_count: 5
