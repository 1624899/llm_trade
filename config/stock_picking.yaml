    bt_momentum_ret5_min: 4.0
    bt_momentum_ret5_max: 10.0
    bt_momentum_min_intraday_position: 0.55
    bt_momentum_max_volume_ratio: 2.7
    bt_first_limit_max_bias20: 1.12
    bt_first_limit_ret5_max: 16.0
    bt_first_limit_ret20_max: 22.0
    bt_first_limit_max_volume_ratio: 3.8
    bt_support_max_volume_ratio: 0.58
