# AI选股Agent配置文件

default_profile: "balanced"

market_regime:
  enabled: true
  allow_empty_on_extreme_risk: true
  min_history_days: 60
  lookback_days: 120
  limit_up_change_pct: 9.5
  limit_down_change_pct: -9.5
  hot_limit_streak: 7
  cold_limit_streak: 2
  indices:
    sh000001: "上证指数"
    sh000300: "沪深300"
    sz399006: "创业板指"
  profile_map:
    defensive: "conservative"
    range_bound: "balanced"
    offensive: "aggressive"
    extreme_risk: "conservative"
    unknown: "balanced"

theme_scoring:
  enabled: true
  top_boards_per_kind: 8
  max_bonus: 12.0

