    min_history_days: 60
    max_annual_vol20: 0.60
    max_volume_ratio: 3.2
    min_volume_ratio_near_high60: 0.9
    min_total_market_cap: 8000000000
    min_avg_amount20: 80000000
    ret20_min: -3.0
    ret20_max: 20.0
    ret5_min: -5.0
    max_ma5_ma20_ratio: 1.10
    max_momentum_bias20: 1.18
    max_trend_bias20: 1.16
    # 回测校准参数：基于 walk_forward_masked 420 条样本，保留强动量优势，近似关停龙回头弱样本。
    bt_max_trend_bias20: 1.14
    bt_trend_ret20_min: 3.0
    bt_trend_ret5_min: 0.0
    bt_trend_ret5_max: 8.0
    bt_trend_min_volume_ratio: 0.95
    bt_trend_max_volume_ratio: 2.8
    bt_trend_min_intraday_position: 0.50
    bt_trend_ma20_ma60_min: 1.0
    bt_max_momentum_bias20: 1.18
    bt_momentum_ret20_min: 24.0
    bt_momentum_ret10_min: 10.0
    bt_momentum_ret5_min: 5.0
    bt_momentum_ret5_max: 10.0
    bt_momentum_min_intraday_position: 0.55
    bt_momentum_max_volume_ratio: 2.7
    bt_first_limit_max_bias20: 1.10
    bt_first_limit_ret5_max: 14.0
    bt_first_limit_ret20_max: 18.0
    bt_first_limit_max_volume_ratio: 3.4
    bt_support_max_volume_ratio: 0.55
    bt_support_min_intraday_position: 0.68
    bt_support_ret1_max: 0.8
    bt_dragon_min_intraday_position: 0.90
    min_new_stock_history_days: 30
    allow_new_stock_channel: false
    turnover_rate_min: 0.8
    turnover_rate_max: 12.0
    max_per_industry: 2
    limit_up_change_pct: 9.5
    limit_down_change_pct: -9.5

  balanced:
    min_price: 2.0
    min_history_days: 60
    max_annual_vol20: 0.80
    max_volume_ratio: 4.2
    min_volume_ratio_near_high60: 0.8
    min_total_market_cap: 3000000000
    min_avg_amount20: 50000000
    ret20_min: -5.0
    ret20_max: 30.0
    ret5_min: -8.0
    max_ma5_ma20_ratio: 1.15
    max_momentum_bias20: 1.22
    max_trend_bias20: 1.18
    # 回测校准参数：balanced 是默认实盘档，优先使用这一组继续滚动验证。
    bt_max_trend_bias20: 1.15
    bt_trend_ret20_min: 2.0
    bt_trend_ret5_min: 0.0
    bt_trend_ret5_max: 9.0
    bt_trend_min_volume_ratio: 0.90
    bt_trend_max_volume_ratio: 3.0
